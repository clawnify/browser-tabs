name: Publish to npm

# Publishes @clawnify/browser-tabs to npm when a GitHub Release is published.
# Ships raw TypeScript (OpenClaw loads .ts via openclaw.extensions) — no build
# step. Requires an NPM_TOKEN secret (an npm automation/granular token with
# publish rights to the @clawnify scope).

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
